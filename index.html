<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Aegis Nova — Elite Serverless Engineering Suite</title>
    <meta name="description" content="Four elite browser-native engineering tools. The Vault (security auditor), Data Titan (1GB+ ETL), Opti-Neural (AI image compression), Logic Flow (code flowcharts). Zero data leaves your machine." />
    <meta name="keywords" content="security audit, code scanner, csv processor, image compressor, flowchart generator, serverless tools, privacy-first" />
    <meta name="author" content="Aegis Nova" />

    <!-- Open Graph -->
    <meta property="og:title" content="Aegis Nova — Elite Serverless Engineering Suite" />
    <meta property="og:description" content="Four elite browser-native engineering tools. 100% client-side. Zero-data architecture." />
    <meta property="og:type" content="website" />

    <!-- Security headers via meta (supplemented by GitHub Pages _headers or vercel.json) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Favicon (inline SVG data URI) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236366f1'/><path d='M50 18L22 32v20c0 16 12 30 28 34 16-4 28-18 28-34V32L50 18z' fill='%23fff' opacity='.9'/></svg>" />

    <style>
      /* Critical above-fold CSS — prevents FOUC */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { background: #050505; color: #fff; }
      body { background: #050505; min-height: 100vh; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
